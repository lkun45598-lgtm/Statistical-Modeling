project:
  name: reefcastnet_toy
  seed: 42
  output_dir: outputs_toy

region:
  lat_min: 0.0
  lat_max: 25.0
  lon_min: 100.0
  lon_max: 125.0

erddap:
  base_url: "https://coastwatch.noaa.gov/erddap/griddap"
  sst_dataset: "noaacrwsstDaily"
  sst_var: "analysed_sst"
  time_suffix: "T12:00:00Z"

data:
  raw_dir: data/raw
  processed_dir: data/processed
  dataset_name: toy_weekly
  years: [2018, 2020]
  weekly_freq: "7D"
  train_years: [2018, 2019]
  val_years: [2020, 2020]
  test_years: [2020, 2020]
  fill_nan: "zero_anomaly"
  patch_size: null
  reef_boxes:
    - ["toy_reef", 7.0, 14.0, 110.0, 117.0]
  reef_buffer_cells: 3

forecast:
  input_len: 8
  output_len: 8
  lead_weeks: [1, 2, 4, 8]
  bleaching_threshold_c: 1.0
  dhw_window_weeks: 8

model:
  name: reefcastnet_simvp
  static_channels: ["mmm", "reef_mask", "reef_buffer", "lat", "lon"]
  hidden_dim: 16
  encoder_depth: 1
  temporal_depth: 1
  decoder_depth: 1
  kernel_size: 3
  num_alert_classes: 5
  use_alert_head: true

loss:
  reef_weight: 2.0
  reef_buffer_weight: 1.0
  ssta_weight: 1.0
  hotspot_weight: 0.1
  dhw_weight: 0.1
  alert_weight: 0.05
  gradient_weight: 0.02
  focal_gamma: 2.0
  dhw_soft_gate_k: 8.0

train:
  epochs: 2
  batch_size: 2
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0
  amp: false
  grad_clip_norm: 1.0
  save_every: 1
  early_stop_patience: 3

runtime:
  device: "cpu"
  distributed: false
